<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Journal Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Inter", "Noto Sans TC", "system-ui", "sans-serif"]
          },
          colors: {
            paper: "#fbf7ef",
            washi: "#f0e6d6",
            ink: "#24313f",
            matcha: "#5f7f6a",
            persimmon: "#c76d4b",
            sakura: "#e7b7aa",
            sora: "#7aa5b8"
          }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="dashboard" class="min-h-screen bg-paper text-ink">
  <main class="min-h-screen">
    <section class="page-hero relative overflow-hidden border-b border-washi bg-matcha text-white">
      <img
        class="absolute inset-0 h-full w-full object-cover opacity-25"
        src="https://images.unsplash.com/photo-1528360983277-13d401cdc186?auto=format&fit=crop&w=1800&q=80"
        alt="Japanese street with lanterns"
      >
      <div class="relative mx-auto flex min-h-[30vh] max-w-6xl flex-col justify-end px-5 py-7 sm:px-8">
        <div class="flex flex-col gap-5 sm:flex-row sm:items-end sm:justify-between">
          <div class="hero-panel max-w-2xl">
            <p class="text-xs font-bold uppercase tracking-[0.24em] text-washi">Travel Journal</p>
            <h1 class="hero-title">
            <span class="marker-title">Dashboard</span>
            </h1>      
            <p class="mt-3 max-w-xl text-sm leading-6 text-white/85 sm:text-base">
              這是我的旅行手帳。
            </p>
          </div>
          <a
            href="add-trip.html"
            class="inline-flex min-h-11 items-center justify-center rounded-md bg-persimmon px-5 text-sm font-bold text-white shadow-sm transition hover:bg-persimmon/90 focus:outline-none focus:ring-2 focus:ring-white/70"
          >
            新增旅程
          </a>
        </div>
      </div>
    </section>

    <section class="mx-auto grid max-w-6xl gap-6 px-5 py-6 sm:px-8 lg:grid-cols-[minmax(0,1fr)_360px] lg:items-start">
      <section class="rounded-lg bg-white p-5 shadow-sm ring-1 ring-black/5 sm:p-6 lg:col-start-1">
        <div class="flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
          <div>
            <p class="text-xs font-bold uppercase tracking-[0.22em] text-persimmon">Selected Day</p>
            <h2 class="mt-2 text-3xl font-bold">今日／所選日期景點</h2>
          </div>
          <p id="selectedDateLabel" class="rounded-full bg-washi px-4 py-2 text-sm font-bold text-matcha">選擇日期</p>
        </div>
        <div id="dateSpots" class="mt-5 space-y-4"></div>
      </section>

      <aside class="space-y-4 lg:col-start-2 lg:row-span-2">
        <section class="rounded-lg bg-white/90 p-5 shadow-sm ring-1 ring-black/5">
          <div class="flex items-center justify-between gap-2">
            <button id="prevMonth" class="grid h-10 w-10 place-items-center rounded-md border border-washi text-lg font-bold transition hover:bg-washi" aria-label="上一個月">
              &lt;
            </button>
            <div class="text-center">
              <h2 id="calendarTitle" class="text-lg font-bold">月曆</h2>
              <p class="text-xs font-semibold text-slate-500">點擊日期查看景點</p>
            </div>
            <button id="nextMonth" class="grid h-10 w-10 place-items-center rounded-md border border-washi text-lg font-bold transition hover:bg-washi" aria-label="下一個月">
              &gt;
            </button>
          </div>

          <div class="mt-4 grid grid-cols-7 gap-1 text-center text-xs font-bold text-slate-500">
            <span>日</span>
            <span>一</span>
            <span>二</span>
            <span>三</span>
            <span>四</span>
            <span>五</span>
            <span>六</span>
          </div>
          <div id="calendarGrid" class="mt-2 grid grid-cols-7 gap-1"></div>
        </section>
      </aside>

      <section class="min-w-0 lg:col-start-1">
        <div class="mb-4 flex items-end justify-between gap-3">
          <div>
            <h2 class="text-2xl font-bold">所有旅程</h2>
            <p class="text-sm text-slate-600">點擊卡片查看每日行程。</p>
          </div>
          <p id="tripCount" class="rounded-full bg-washi px-3 py-1 text-xs font-bold text-slate-700">0 trips</p>
        </div>

        <div id="emptyTrips" class="rounded-lg border border-dashed border-slate-300 bg-white/80 p-8 text-center shadow-sm">
          <p class="text-lg font-bold">還沒有旅程</p>
          <p class="mt-2 text-sm text-slate-600">先新增一段旅行，再回來安排每日景點。</p>
          <a href="add-trip.html" class="mt-5 inline-flex min-h-11 items-center rounded-md bg-matcha px-5 text-sm font-bold text-white">
            新增旅程
          </a>
        </div>

        <div id="tripGrid" class="grid gap-4 sm:grid-cols-2"></div>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
