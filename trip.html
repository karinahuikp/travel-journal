<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅行手帳主頁</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Inter", "Noto Sans TC", "system-ui", "sans-serif"]
          },
          colors: {
            paper: "#fbf7ef",
            washi: "#f0e6d6",
            ink: "#24313f",
            matcha: "#5f7f6a",
            persimmon: "#c76d4b",
            sakura: "#e7b7aa",
            sora: "#7aa5b8"
          }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-paper text-ink">
  <main class="min-h-screen">
    <section class="page-hero relative overflow-hidden border-b border-washi bg-matcha text-white">
      <img
        class="absolute inset-0 h-full w-full object-cover opacity-25"
        src="https://images.unsplash.com/photo-1528360983277-13d401cdc186?auto=format&fit=crop&w=1800&q=80"
        alt="Japanese street with lanterns"
      >
      <div class="relative mx-auto flex min-h-[30vh] max-w-6xl flex-col justify-end px-5 py-7 sm:px-8">
        <div class="hero-panel max-w-2xl">
          <p class="text-xs font-bold uppercase tracking-[0.24em] text-washi"> OUR Travel Journal</p>
          <h1 class="mt-3 text-4xl font-bold leading-tight sm:text-5xl">旅行手帳主頁</h1>
          <p class="mt-3 max-w-xl text-sm leading-6 text-white/85 sm:text-base">
            查看所有已同步到的旅程、每日景點和記帳總覽。
          </p>
        </div>
      </div>
    </section>

    <section id="loadingState" class="mx-auto max-w-6xl px-5 py-6 sm:px-8">
      <div class="rounded-lg border border-dashed border-slate-300 bg-white p-8 text-center">
        <p class="text-lg font-bold">讀取旅程資料中</p>
        <p class="mt-2 text-sm text-slate-600">正在從 Google Sheet 取得公開旅程。</p>
      </div>
    </section>

    <section id="errorState" class="mx-auto hidden max-w-6xl px-5 py-6 sm:px-8">
      <div class="rounded-lg border border-dashed border-slate-300 bg-white p-8 text-center">
        <p class="text-lg font-bold">無法讀取團友版 Dashboard</p>
        <p id="errorText" class="mt-2 text-sm text-slate-600"></p>
      </div>
    </section>

    <section id="dashboardContent" class="mx-auto hidden max-w-6xl grid-cols-1 gap-6 px-5 py-6 sm:px-8 lg:grid lg:grid-cols-[minmax(0,1fr)_360px] lg:items-start">
      <section class="rounded-lg bg-white p-5 shadow-sm ring-1 ring-black/5 sm:p-6 lg:col-start-1">
        <div class="flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
          <div>
            <p class="text-xs font-bold uppercase tracking-[0.22em] text-persimmon">Selected Day</p>
            <h2 class="mt-2 text-3xl font-bold">今日／所選日期景點</h2>
          </div>
          <p id="selectedDateLabel" class="rounded-full bg-washi px-4 py-2 text-sm font-bold text-matcha">選擇日期</p>
        </div>
        <div id="dateSpots" class="mt-5 space-y-4"></div>
      </section>

      <aside class="mt-6 space-y-4 lg:col-start-2 lg:row-span-2 lg:mt-0">
        <section class="rounded-lg bg-white/90 p-5 shadow-sm ring-1 ring-black/5">
          <div class="flex items-center justify-between gap-2">
            <button id="prevMonth" class="grid h-10 w-10 place-items-center rounded-md border border-washi text-lg font-bold transition hover:bg-washi" aria-label="上一個月" type="button">
              &lt;
            </button>
            <div class="text-center">
              <h2 id="calendarTitle" class="text-lg font-bold">月曆</h2>
              <p class="text-xs font-semibold text-slate-500">點擊日期查看景點</p>
            </div>
            <button id="nextMonth" class="grid h-10 w-10 place-items-center rounded-md border border-washi text-lg font-bold transition hover:bg-washi" aria-label="下一個月" type="button">
              &gt;
            </button>
          </div>

          <div class="mt-4 grid grid-cols-7 gap-1 text-center text-xs font-bold text-slate-500">
            <span>日</span>
            <span>一</span>
            <span>二</span>
            <span>三</span>
            <span>四</span>
            <span>五</span>
            <span>六</span>
          </div>
          <div id="calendarGrid" class="mt-2 grid grid-cols-7 gap-1"></div>
        </section>
      </aside>

      <section class="mt-6 min-w-0 lg:col-start-1 lg:mt-0">
        <div class="mb-4 flex items-end justify-between gap-3">
          <div>
            <h2 class="text-2xl font-bold">所有旅程</h2>
            <p class="text-sm text-slate-600">點擊卡片查看單一旅程詳情。</p>
          </div>
          <p id="tripCount" class="rounded-full bg-washi px-3 py-1 text-xs font-bold text-slate-700">0 trips</p>
        </div>

        <div id="emptyTrips" class="hidden rounded-lg border border-dashed border-slate-300 bg-white/80 p-8 text-center shadow-sm">
          <p class="text-lg font-bold">目前沒有已同步旅程</p>
          <p class="mt-2 text-sm text-slate-600">請先在管理頁同步旅程到 Google Sheet。</p>
        </div>

        <div id="tripGrid" class="grid gap-4 sm:grid-cols-2"></div>
      </section>
    </section>
  </main>

  <script src="sheets-api.js"></script>
  <script>
    let trips = [];
    let calendarDate = new Date();
    let selectedCalendarDate = toDateKey(calendarDate);

    const loadingState = document.querySelector("#loadingState");
    const errorState = document.querySelector("#errorState");
    const errorText = document.querySelector("#errorText");
    const dashboardContent = document.querySelector("#dashboardContent");
    const selectedDateLabel = document.querySelector("#selectedDateLabel");
    const dateSpots = document.querySelector("#dateSpots");
    const calendarTitle = document.querySelector("#calendarTitle");
    const calendarGrid = document.querySelector("#calendarGrid");
    const tripCount = document.querySelector("#tripCount");
    const emptyTrips = document.querySelector("#emptyTrips");
    const tripGrid = document.querySelector("#tripGrid");

    document.querySelector("#prevMonth").addEventListener("click", () => {
      calendarDate = new Date(calendarDate.getFullYear(), calendarDate.getMonth() - 1, 1);
      selectedCalendarDate = toDateKey(calendarDate);
      renderDashboard();
    });

    document.querySelector("#nextMonth").addEventListener("click", () => {
      calendarDate = new Date(calendarDate.getFullYear(), calendarDate.getMonth() + 1, 1);
      selectedCalendarDate = toDateKey(calendarDate);
      renderDashboard();
    });

    calendarGrid.addEventListener("click", (event) => {
      const button = event.target.closest("[data-date]");
      if (!button) return;
      selectedCalendarDate = button.dataset.date;
      renderDashboard();
    });

    loadPublicDashboard();

    async function loadPublicDashboard() {
      try {
        if (typeof fetchAllTripsFromGoogleSheet !== "function") {
          throw new Error("找不到 fetchAllTripsFromGoogleSheet()。請確認 sheets-api.js 已更新並成功載入。");
        }

        const result = await withTimeout(
          fetchAllTripsFromGoogleSheet(),
          15000,
          "讀取 Google Sheet 逾時。請確認 Apps Script Web App 已重新部署，且 doGet() 支援 action=getAllTrips。"
        );
        trips = result;
        loadingState.classList.add("hidden");
        dashboardContent.classList.remove("hidden");
        renderDashboard();
      } catch (error) {
        showLoadError(error.message);
      }
    }

    function withTimeout(promise, timeoutMs, message) {
      return Promise.race([
        promise,
        new Promise((resolve, reject) => {
          setTimeout(() => reject(new Error(message)), timeoutMs);
        })
      ]);
    }

    function showLoadError(message) {
      loadingState.classList.add("hidden");
      errorText.textContent = message;
      errorState.classList.remove("hidden");
    }

    function renderDashboard() {
      const sortedTrips = [...trips].sort((a, b) => String(a.startDate).localeCompare(String(b.startDate)));
      const hasTrips = sortedTrips.length > 0;

      emptyTrips.classList.toggle("hidden", hasTrips);
      tripGrid.innerHTML = sortedTrips.map(renderTripCard).join("");
      tripCount.textContent = `${sortedTrips.length} ${sortedTrips.length === 1 ? "trip" : "trips"}`;

      renderCalendar();
      renderDateSpots();
    }

    function renderTripCard(trip) {
      const dailyPlans = Array.isArray(trip.dailyPlans) ? trip.dailyPlans : [];
      const expenses = Array.isArray(trip.expenses) ? trip.expenses : [];
      const spotsCount = dailyPlans.reduce((sum, plan) => sum + (plan.spots || []).length, 0);
      const totals = formatCurrencyTotals(getExpenseTotals(expenses));
      const averages = formatCurrencyTotals(getAverageTotals(getExpenseTotals(expenses), (trip.members || []).length));

      return `
        <a href="share.html?tripId=${encodeURIComponent(trip.tripId)}" class="block rounded-lg bg-white/90 p-5 shadow-sm ring-1 ring-black/5 transition hover:-translate-y-0.5 hover:shadow-md focus:outline-none focus:ring-2 focus:ring-matcha">
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0">
              <p class="text-xs font-bold uppercase tracking-[0.18em] text-persimmon">${formatDateRange(trip.startDate, trip.endDate)}</p>
              <h3 class="mt-3 break-words text-2xl font-bold">${escapeHtml(trip.title || "未命名旅程")}</h3>
              <p class="mt-2 text-sm font-bold text-matcha">${escapeHtml(trip.destination || "未設定目的地")}</p>
            </div>
            <span class="rounded-full bg-washi px-3 py-1 text-xs font-bold text-slate-700">只讀</span>
          </div>
          <div class="mt-5 grid grid-cols-2 gap-3 text-center">
            <div class="rounded-md bg-paper p-3">
              <p class="text-xl font-bold text-matcha">${dailyPlans.length}</p>
              <p class="mt-1 text-xs font-bold text-slate-500">每日行程</p>
            </div>
            <div class="rounded-md bg-paper p-3">
              <p class="text-xl font-bold text-matcha">${spotsCount}</p>
              <p class="mt-1 text-xs font-bold text-slate-500">景點</p>
            </div>
          </div>
          <div class="mt-4 grid gap-2 text-sm sm:grid-cols-2">
            <div class="rounded-md bg-paper px-3 py-2">
              <p class="text-xs font-bold text-slate-500">總支出</p>
              <p class="mt-1 font-bold">${escapeHtml(totals)}</p>
            </div>
            <div class="rounded-md bg-paper px-3 py-2">
              <p class="text-xs font-bold text-slate-500">每人平均</p>
              <p class="mt-1 font-bold">${escapeHtml(averages)}</p>
            </div>
          </div>
        </a>
      `;
    }

    function renderCalendar() {
      const year = calendarDate.getFullYear();
      const month = calendarDate.getMonth();
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const entriesByDate = getEntriesByDate();
      const cells = [];

      calendarTitle.textContent = new Intl.DateTimeFormat("zh-Hant", {
        year: "numeric",
        month: "long"
      }).format(calendarDate);

      for (let index = 0; index < firstDay; index += 1) {
        cells.push(`<span class="min-h-11 rounded-md bg-paper/50"></span>`);
      }

      for (let day = 1; day <= daysInMonth; day += 1) {
        const dateKey = toDateKey(new Date(year, month, day));
        const hasEntries = Boolean(entriesByDate[dateKey]?.length);
        const selected = dateKey === selectedCalendarDate;
        const classes = selected
          ? "bg-matcha text-white"
          : hasEntries
            ? "bg-sakura/40 text-ink hover:bg-sakura/60"
            : "bg-paper text-slate-700 hover:bg-washi";

        cells.push(`
          <button class="relative min-h-11 rounded-md text-sm font-bold transition ${classes}" data-date="${dateKey}" type="button">
            ${day}
            ${hasEntries ? `<span class="absolute bottom-1 left-1/2 h-1.5 w-1.5 -translate-x-1/2 rounded-full bg-persimmon"></span>` : ""}
          </button>
        `);
      }

      calendarGrid.innerHTML = cells.join("");
    }

    function renderDateSpots() {
      selectedDateLabel.textContent = formatDate(selectedCalendarDate);

      const entries = getEntriesByDate()[selectedCalendarDate] || [];
      if (!entries.length) {
        dateSpots.innerHTML = `
          <div class="rounded-lg border border-dashed border-slate-300 bg-paper p-6 text-center">
            <p class="text-lg font-bold">這一天還沒有安排景點</p>
            <p class="mt-2 text-sm text-slate-600">點擊月曆中有標記的日期查看所有旅程的景點。</p>
          </div>
        `;
        return;
      }

      dateSpots.innerHTML = entries.map((entry) => `
        <article class="rounded-lg bg-paper p-5 ring-1 ring-washi">
          <div class="flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
            <div>
              <p class="text-sm font-bold text-matcha">${escapeHtml(entry.tripTitle)} · Day ${entry.dayNumber}</p>
              <h3 class="mt-2 text-2xl font-bold">${escapeHtml(entry.location || "")}</h3>
            </div>
            <a href="share.html?tripId=${encodeURIComponent(entry.tripId)}" class="inline-flex min-h-10 items-center justify-center rounded-md bg-matcha px-4 text-sm font-bold text-white transition hover:bg-matcha/90">
              查看旅程
            </a>
          </div>
          <dl class="mt-4 grid gap-3 sm:grid-cols-2">
            <div class="rounded-md bg-white px-4 py-3">
              <dt class="text-xs font-bold text-slate-500">車程／交通方式</dt>
              <dd class="mt-1 font-semibold">${escapeHtml(entry.transport || "未填寫")}</dd>
            </div>
            <div class="rounded-md bg-white px-4 py-3">
              <dt class="text-xs font-bold text-slate-500">住宿地點</dt>
              <dd class="mt-1 font-semibold">${escapeHtml(entry.accommodation || "未填寫")}</dd>
            </div>
          </dl>
          <p class="mt-5 text-sm font-bold text-slate-700">景點列表</p>
          <ul class="mt-2 grid gap-2 sm:grid-cols-2">
            ${(entry.spots || []).map((spot) => `<li class="rounded-md bg-white px-4 py-3 text-sm font-semibold">${escapeHtml(spot)}</li>`).join("")}
          </ul>
        </article>
      `).join("");
    }

    function getEntriesByDate() {
      return trips.reduce((dates, trip) => {
        (trip.dailyPlans || []).forEach((plan) => {
          if (!dates[plan.date]) dates[plan.date] = [];
          dates[plan.date].push({
            tripId: trip.tripId,
            tripTitle: trip.title,
            dayNumber: plan.dayNumber,
            location: plan.location,
            transport: plan.transport,
            accommodation: plan.accommodation,
            spots: plan.spots || []
          });
        });
        return dates;
      }, {});
    }

    function getExpenseTotals(expenses) {
      return expenses.reduce((totals, expense) => {
        const currency = expense.currency || "";
        totals[currency] = (totals[currency] || 0) + (Number(expense.amount) || 0);
        return totals;
      }, {});
    }

    function getAverageTotals(totals, memberCount) {
      return Object.entries(totals).reduce((averages, [currency, amount]) => {
        averages[currency] = memberCount ? Math.round((amount / memberCount) * 100) / 100 : 0;
        return averages;
      }, {});
    }

    function formatCurrencyTotals(totals) {
      const entries = Object.entries(totals);
      if (!entries.length) return "0";
      return entries.map(([currency, amount]) => `${formatAmount(amount)} ${currency}`).join(" / ");
    }

    function formatDateRange(startDate, endDate) {
      if (!startDate && !endDate) return "未設定日期";
      if (!endDate || startDate === endDate) return formatDate(startDate);
      return `${formatDate(startDate)} - ${formatDate(endDate)}`;
    }

    function formatDate(value) {
      if (!value) return "未設定日期";
      const date = parseDateValue(value);
      if (Number.isNaN(date.getTime())) return String(value);

      return new Intl.DateTimeFormat("zh-Hant", {
        year: "numeric",
        month: "long",
        day: "numeric"
      }).format(date);
    }

    function parseDateValue(value) {
      if (value instanceof Date) return value;
      if (typeof value === "number") return new Date(value);
      if (typeof value !== "string") return new Date(String(value));

      const trimmed = value.trim();
      if (/^\d{4}-\d{2}-\d{2}$/.test(trimmed)) {
        return new Date(`${trimmed}T00:00:00`);
      }
      return new Date(trimmed);
    }

    function formatAmount(value) {
      return new Intl.NumberFormat("zh-Hant", { maximumFractionDigits: 2 }).format(Number(value) || 0);
    }

    function toDateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
