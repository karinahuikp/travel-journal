<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Trip | Travel Journal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Inter", "Noto Sans TC", "system-ui", "sans-serif"]
          },
          colors: {
            paper: "#fbf7ef",
            washi: "#f0e6d6",
            ink: "#24313f",
            matcha: "#5f7f6a",
            persimmon: "#c76d4b",
            sakura: "#e7b7aa",
            sora: "#7aa5b8"
          }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="add-trip" class="min-h-screen bg-paper text-ink">
  <main class="mx-auto min-h-screen max-w-3xl px-5 py-6 sm:px-8">
    <nav class="mb-6 flex items-center justify-between gap-3">
      <a href="index.html" class="rounded-md border border-washi bg-white px-4 py-2 text-sm font-bold text-slate-700 transition hover:bg-washi">
        返回
      </a>
      <p class="text-xs font-bold uppercase tracking-[0.22em] text-matcha">Add Trip</p>
    </nav>

    <section class="overflow-hidden rounded-lg bg-white shadow-sm ring-1 ring-black/5">
      <div class="hero-strip relative bg-matcha px-5 py-10 text-white sm:px-8">
        <img
          class="absolute inset-0 h-full w-full object-cover opacity-20"
          src="https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=1400&q=80"
          alt="Kyoto temple travel view"
        >
        <div class="hero-panel relative">
          <h1 class="text-4xl font-bold">新增旅程</h1>
          <p class="mt-3 max-w-xl text-sm leading-6 text-white/85">
            先建立旅程骨架，之後再到旅程詳情裡安排每日行程。
          </p>
        </div>
      </div>

      <form id="addTripForm" class="space-y-5 p-5 sm:p-8">
        <label class="block">
          <span class="text-sm font-bold text-slate-700">旅程名稱</span>
          <input id="tripTitle" class="mt-1 w-full rounded-md border border-slate-300 bg-white px-3 py-3 focus:border-matcha focus:outline-none focus:ring-2 focus:ring-matcha/20" type="text" placeholder="例如：瀨戶內海小旅行" required>
        </label>

        <div class="grid gap-4 sm:grid-cols-2">
          <label class="block">
            <span class="text-sm font-bold text-slate-700">日期</span>
            <input id="tripDate" class="mt-1 w-full rounded-md border border-slate-300 bg-white px-3 py-3 focus:border-matcha focus:outline-none focus:ring-2 focus:ring-matcha/20" type="date" required>
          </label>

          <label class="block">
            <span class="text-sm font-bold text-slate-700">天數</span>
            <input id="tripDays" class="mt-1 w-full rounded-md border border-slate-300 bg-white px-3 py-3 focus:border-matcha focus:outline-none focus:ring-2 focus:ring-matcha/20" type="number" min="1" value="3" required>
          </label>
        </div>

        <label class="block">
          <span class="text-sm font-bold text-slate-700">目的地</span>
          <input id="tripLocation" class="mt-1 w-full rounded-md border border-slate-300 bg-white px-3 py-3 focus:border-matcha focus:outline-none focus:ring-2 focus:ring-matcha/20" type="text" placeholder="城市、國家或區域" required>
        </label>

        <label class="block">
          <span class="text-sm font-bold text-slate-700">團友</span>
          <textarea id="tripMembers" class="mt-1 min-h-28 w-full rounded-md border border-slate-300 bg-white px-3 py-3 focus:border-matcha focus:outline-none focus:ring-2 focus:ring-matcha/20" placeholder="一行一位同行者，例如：&#10;Karina&#10;媽媽&#10;朋友A"></textarea>
          <span class="mt-2 block text-xs font-semibold text-slate-500">可用換行或逗號分隔，之後也能在旅程詳情新增或刪除。</span>
        </label>

        <div class="flex flex-col-reverse gap-3 pt-2 sm:flex-row sm:justify-end">
          <a href="index.html" class="inline-flex min-h-11 items-center justify-center rounded-md border border-slate-300 px-5 text-sm font-bold text-slate-700 transition hover:bg-washi">
            取消
          </a>
          <button class="inline-flex min-h-11 items-center justify-center rounded-md bg-persimmon px-5 text-sm font-bold text-white transition hover:bg-persimmon/90" type="submit">
            建立旅程
          </button>
        </div>
      </form>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
